<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Music Scraper Hub</title>

    <link rel="icon" type="image/png" sizes="32x32" href="images/icon.PNG">
    <link rel="icon" type="image/png" sizes="16x16" href="images/icon.PNG">
    <link rel="shortcut icon" href="images/icon.PNG">
    <link rel="apple-touch-icon" href="images/icon.PNG">

    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .background-orbs { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; overflow: hidden; }
        .orb { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.25; }
        .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, #e94560, transparent 70%); top: -200px; left: -200px; animation: d1 25s ease-in-out infinite; }
        .orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, #0f3460, transparent 70%); bottom: -150px; right: -200px; animation: d2 30s ease-in-out infinite; }
        @keyframes d1{0%,100%{transform:translate(0,0)}50%{transform:translate(120px,180px)}}
        @keyframes d2{0%,100%{transform:translate(0,0)}50%{transform:translate(-100px,-120px)}}

        .auth-container {
            position: relative; z-index: 3;
            width: 100%; max-width: 420px; padding: 20px;
        }

        .auth-card {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px; padding: 40px 32px; backdrop-filter: blur(20px);
        }

        .auth-logo { text-align: center; margin-bottom: 28px; }
        .auth-logo img { width: 64px; height: 64px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); }
        .auth-logo h1 {
            font-size: 1.4rem; font-weight: 800; margin-top: 12px;
            background: linear-gradient(180deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .auth-logo p { font-size: 0.8rem; color: #888; margin-top: 4px; }

        /* Tabs */
        .auth-tabs { display: flex; gap: 4px; margin-bottom: 28px; background: rgba(255,255,255,0.04); border-radius: 12px; padding: 4px; }
        .auth-tab {
            flex: 1; padding: 10px; text-align: center; border-radius: 10px; cursor: pointer;
            font-size: 0.85rem; font-weight: 600; color: #888; transition: all 0.3s;
            border: none; background: transparent;
        }
        .auth-tab.active { background: rgba(233,69,96,0.2); color: #e94560; }
        .auth-tab:hover:not(.active) { color: #bbb; }

        /* Form */
        .auth-form { display: flex; flex-direction: column; gap: 16px; }
        .auth-form.hidden { display: none; }

        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 0.78rem; color: #888; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }
        .form-group input {
            padding: 14px 16px; border-radius: 12px;
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; font-size: 0.95rem; font-family: inherit; transition: border-color 0.3s;
        }
        .form-group input:focus { outline: none; border-color: #e94560; }
        .form-group input::placeholder { color: #555; }

        .btn-submit {
            padding: 14px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, #e94560, #533483); color: #fff;
            font-size: 0.95rem; font-weight: 700; cursor: pointer;
            transition: all 0.3s; margin-top: 4px;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(233,69,96,0.4); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        .auth-message {
            padding: 12px 16px; border-radius: 10px; font-size: 0.82rem; text-align: center;
            display: none;
        }
        .auth-message.error { display: block; background: rgba(233,69,96,0.15); border: 1px solid rgba(233,69,96,0.3); color: #ff6b8a; }
        .auth-message.success { display: block; background: rgba(0,200,100,0.12); border: 1px solid rgba(0,200,100,0.3); color: #4ade80; }

        .auth-footer { text-align: center; margin-top: 20px; font-size: 0.8rem; color: #666; }
        .auth-footer a { color: #e94560; text-decoration: none; font-weight: 500; }
        .auth-footer a:hover { text-decoration: underline; }

        .spinner-inline { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="background-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <a href="index.html"><img src="./images/icon.PNG" alt="Logo"></a>
                <h1>Music Scraper Hub</h1>
                <p>Accede a tus listas de canciones</p>
            </div>

            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Iniciar Sesión</button>
                <button class="auth-tab" data-tab="register">Crear Cuenta</button>
            </div>

            <!-- Message -->
            <div class="auth-message" id="authMessage"></div>

            <!-- Login Form -->
            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" placeholder="tu@email.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Contraseña</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password" minlength="6">
                </div>
                <button type="submit" class="btn-submit" id="loginBtn">Entrar</button>
            </form>

            <!-- Register Form -->
            <form class="auth-form hidden" id="registerForm">
                <div class="form-group">
                    <label for="regEmail">Email</label>
                    <input type="email" id="regEmail" placeholder="tu@email.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="regPassword">Contraseña</label>
                    <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres" required autocomplete="new-password" minlength="6">
                </div>
                <div class="form-group">
                    <label for="regPassword2">Confirmar Contraseña</label>
                    <input type="password" id="regPassword2" placeholder="Repite la contraseña" required autocomplete="new-password" minlength="6">
                </div>
                <button type="submit" class="btn-submit" id="regBtn">Crear Cuenta</button>
            </form>

            <div class="auth-footer">
                <a href="index.html">← Volver al inicio</a>
            </div>
        </div>
    </div>

    <script>
    (() => {
        const API = window.location.origin;

        // ─── Gestión de sesión en localStorage ────────────────────────────
        const Auth = {
            save(data) {
                localStorage.setItem('msh_session', JSON.stringify(data));
            },
            get() {
                try { return JSON.parse(localStorage.getItem('msh_session')); } catch { return null; }
            },
            clear() { localStorage.removeItem('msh_session'); },
            getToken() {
                const s = this.get();
                return s?.session?.access_token || null;
            },
            isLoggedIn() { return !!this.getToken(); },
        };

        // Si ya está logueado, redirigir a mis-listas
        if (Auth.isLoggedIn()) {
            window.location.href = 'mis-listas.html';
            return;
        }

        // ─── DOM ──────────────────────────────────────────────────────────
        const $tabs = document.querySelectorAll('.auth-tab');
        const $loginForm = document.getElementById('loginForm');
        const $regForm = document.getElementById('registerForm');
        const $msg = document.getElementById('authMessage');

        // ─── Tab switching ────────────────────────────────────────────────
        $tabs.forEach(tab => tab.addEventListener('click', () => {
            $tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            hideMsg();
            if (tab.dataset.tab === 'login') {
                $loginForm.classList.remove('hidden');
                $regForm.classList.add('hidden');
            } else {
                $loginForm.classList.add('hidden');
                $regForm.classList.remove('hidden');
            }
        }));

        function showMsg(text, type = 'error') {
            $msg.textContent = text;
            $msg.className = 'auth-message ' + type;
        }
        function hideMsg() { $msg.className = 'auth-message'; $msg.textContent = ''; }

        function setLoading(btn, loading) {
            if (loading) {
                btn.disabled = true;
                btn.dataset.origText = btn.textContent;
                btn.innerHTML = '<span class="spinner-inline"></span>Espera...';
            } else {
                btn.disabled = false;
                btn.textContent = btn.dataset.origText || 'Enviar';
            }
        }

        // ─── Login ────────────────────────────────────────────────────────
        $loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMsg();
            const btn = document.getElementById('loginBtn');
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            setLoading(btn, true);
            try {
                const res = await fetch(`${API}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Error de autenticación');

                Auth.save(data);
                window.location.href = 'mis-listas.html';
            } catch (err) {
                showMsg(err.message, 'error');
            } finally {
                setLoading(btn, false);
            }
        });

        // ─── Register ─────────────────────────────────────────────────────
        $regForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMsg();
            const btn = document.getElementById('regBtn');
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const password2 = document.getElementById('regPassword2').value;

            if (password !== password2) { showMsg('Las contraseñas no coinciden.'); return; }

            setLoading(btn, true);
            try {
                const res = await fetch(`${API}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Error al crear cuenta');

                if (data.needsConfirmation) {
                    showMsg('Cuenta creada. Revisa tu email para confirmar y luego inicia sesión.', 'success');
                } else {
                    Auth.save(data);
                    window.location.href = 'mis-listas.html';
                }
            } catch (err) {
                showMsg(err.message, 'error');
            } finally {
                setLoading(btn, false);
            }
        });
    })();
    </script>
</body>
</html>
